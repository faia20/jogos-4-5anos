<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos da Matilde 🌟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #ffd6e8 0%, #c5e8ff 50%, #d4f5d4 100%);
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    text-align: center; color: #ff4081; font-size: 2.5em; margin-bottom: 10px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
    animation: bounce 2s infinite;
  }
  .subtitle { text-align: center; color: #555; font-size: 1.2em; margin-bottom: 15px; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

  /* Botão para repetir instrução */
  .replay-btn-area {
    text-align: center;
    margin-bottom: 15px;
  }
  .replay-instruction {
    background: white;
    border: 3px solid #ff4081;
    color: #ff4081;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 #c2185b;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .replay-instruction:active { transform: translateY(2px); box-shadow: 0 2px 0 #c2185b; }

  .menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 25px;
  }
  .menu-btn {
    padding: 16px 10px; border: none; border-radius: 18px;
    font-size: 1em; font-weight: bold; cursor: pointer;
    transition: all 0.2s; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  }
  .menu-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
  .menu-btn.active { transform: scale(1.05); }
  .btn-name { background: #ff4081; }
  .btn-alphabet { background: #00897b; }
  .btn-count { background: #4caf50; }
  .btn-bignum { background: #e91e63; }
  .btn-add { background: #9c27b0; }
  .btn-sub { background: #673ab7; }
  .btn-colors { background: #2196f3; }
  .btn-shapes { background: #ff9800; }
  .btn-paint { background: #00bcd4; }
  .btn-english { background: #f44336; }
  .btn-panda { background: #424242; }
  .btn-maze { background: #795548; }
  .btn-match { background: #607d8b; }
  .btn-trace { background: #ff5722; }

  .game-area {
    background: white; border-radius: 25px; padding: 30px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 400px;
  }
  .game-title { text-align: center; color: #333; font-size: 1.6em; margin-bottom: 20px; }
  .instruction { text-align: center; font-size: 1.2em; color: #666; margin-bottom: 20px; }

  /* Nome */
  .name-slots { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
  .slot {
    width: 60px; height: 70px; border: 4px dashed #ccc; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2em; font-weight: bold; background: #f9f9f9; transition: all 0.3s; color: #333;
  }
  .slot.filled { border-style: solid; border-color: #4caf50; background: #e8f5e9; }
  .slot.correct { background: #c8e6c9; border-color: #4caf50; animation: pop 0.4s; }
  .slot.wrong { background: #ffcdd2; border-color: #f44336; animation: shake 0.5s; }
  .slot.next-hint { border-color: #ff4081; animation: hintPulse 1.5s infinite; }
  @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  @keyframes hintPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,64,129,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(255,64,129,0); }
  }
  .letters-pool { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .letter-btn {
    width: 60px; height: 60px; border: none; border-radius: 12px;
    background: linear-gradient(145deg, #ffeb3b, #fbc02d);
    font-size: 1.8em; font-weight: bold; cursor: pointer;
    box-shadow: 0 5px 0 #f57f17; transition: all 0.15s; color: #333;
  }
  .letter-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #f57f17; }
  .letter-btn.used { opacity: 0.3; pointer-events: none; }

  /* Contar */
  .count-area {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;
    padding: 20px; background: #fff9e6; border-radius: 15px;
    margin-bottom: 25px; min-height: 140px; align-items: center;
  }
  .count-item { font-size: 3em; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-8px) rotate(5deg);} }
  .number-choices { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  .number-btn {
    width: 80px; height: 80px; border-radius: 50%; border: none;
    background: linear-gradient(145deg, #66bb6a, #43a047);
    color: white; font-size: 2em; font-weight: bold; cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
  }
  .number-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }

  /* Matemática */
  .math-equation {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; font-weight: bold; margin-bottom: 20px; flex-wrap: wrap;
  }
  .math-group {
    background: #f3e5f5; border-radius: 15px; padding: 15px 20px;
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    align-items: center; min-width: 80px; min-height: 80px;
  }
  .math-group.sub-style { background: #ede7f6; }
  .math-item { font-size: 1.8em; animation: float 2s ease-in-out infinite; }
  .math-sign { font-size: 1.5em; color: #555; }
  .math-choices { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
  .math-btn {
    width: 80px; height: 80px; border-radius: 20px; border: none;
    color: white; font-size: 2em; font-weight: bold; cursor: pointer;
  }
  .math-btn.add-btn { background: linear-gradient(145deg, #ba68c8, #8e24aa); box-shadow: 0 5px 0 #6a1b9a; }
  .math-btn.sub-btn { background: linear-gradient(145deg, #9575cd, #5e35b1); box-shadow: 0 5px 0 #4527a0; }
  .math-btn:active { transform: translateY(3px); }
  .math-btn.add-btn:active { box-shadow: 0 2px 0 #6a1b9a; }
  .math-btn.sub-btn:active { box-shadow: 0 2px 0 #4527a0; }

  /* Cores */
  .color-target {
    text-align: center; font-size: 1.8em; margin-bottom: 25px;
    padding: 20px; border-radius: 15px; color: white; font-weight: bold;
  }
  .color-choices {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 15px; max-width: 500px; margin: 0 auto;
  }
  .color-btn {
    height: 100px; border: 4px solid white; border-radius: 20px;
    cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: all 0.15s;
  }
  .color-btn:active { transform: scale(0.95); }

  /* Formas */
  .shape-target { text-align: center; font-size: 1.8em; margin-bottom: 25px; color: #ff9800; font-weight: bold; }
  .shapes-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px; max-width: 600px; margin: 0 auto;
  }
  .shape-btn {
    height: 120px; border: none; background: white; border-radius: 15px;
    cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .shape-btn:active { transform: scale(0.95); }
  .shape-btn svg { width: 80px; height: 80px; }

  /* Pintar */
  .paint-instruction {
    text-align: center; font-size: 1.4em; padding: 15px; border-radius: 15px;
    margin-bottom: 20px; font-weight: bold; background: #e0f7fa; color: #00838f;
    min-height: 60px; display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 10px;
  }
  .paint-canvas-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .paint-canvas {
    background: #fafafa; border-radius: 20px; padding: 15px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.05); max-width: 100%;
  }
  .paint-canvas svg { width: 100%; max-width: 380px; height: auto; display: block; }
  .paint-canvas svg .paintable {
    cursor: pointer; transition: all 0.3s; stroke: #333; stroke-width: 2;
  }
  .paint-canvas svg .paintable:hover { opacity: 0.85; }
  .palette { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
  .paint-color {
    width: 55px; height: 55px; border-radius: 50%; border: 4px solid white;
    cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: all 0.15s; position: relative;
  }
  .paint-color:active { transform: scale(0.9); }
  .paint-color.selected {
    transform: scale(1.2); border-color: #333;
    box-shadow: 0 0 0 3px white, 0 0 0 6px #333;
  }
  .paint-color.required::after {
    content: '👇'; position: absolute; top: -32px; left: 50%;
    transform: translateX(-50%); font-size: 1.6em; animation: bouncePoint 1s infinite;
  }
  @keyframes bouncePoint {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }

  /* Balões (Alfabeto) */
  .balloon-target {
    text-align: center;
    font-size: 1.4em;
    padding: 12px;
    background: #00897b;
    color: white;
    font-weight: bold;
    margin-bottom: 12px;
    border-radius: 15px;
  }
  .balloon-target .target-letter {
    display: inline-block;
    background: white;
    color: #00897b;
    width: 55px;
    height: 55px;
    line-height: 55px;
    border-radius: 50%;
    font-size: 1.3em;
    margin-left: 8px;
    animation: pop 0.6s infinite alternate;
  }
  .balloon-area {
    position: relative;
    width: 100%;
    height: 460px;
    background: linear-gradient(to bottom, #e3f2fd 0%, #bbdefb 60%, #c5e1a5 100%);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .balloon {
    position: absolute;
    width: 65px;
    height: 80px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2), inset 8px 8px 15px rgba(255,255,255,0.3);
    transition: transform 0.1s;
    bottom: -100px;
  }
  .balloon::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 25px;
    background: #555;
    bottom: -23px;
    left: 50%;
    transform: translateX(-50%);
  }
  .balloon:active { transform: scale(0.92); }
  .balloon.popping {
    animation: balloonPop 0.4s forwards;
    pointer-events: none;
  }
  @keyframes balloonPop {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }
  .balloon.wobble {
    animation: wobble 0.4s;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }
  .balloon-progress {
    text-align: center;
    margin-top: 8px;
    font-size: 1.1em;
    color: #555;
    font-weight: bold;
  }

  /* Monstro guloso */
  .monster-scene {
    text-align: center;
    padding: 25px 10px 15px;
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .monster {
    font-size: 7em;
    line-height: 1;
    display: inline-block;
    animation: monsterBounce 1.5s ease-in-out infinite;
  }
  @keyframes monsterBounce {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-12px) scale(1.05); }
  }
  .monster.chewing {
    animation: monsterChew 0.3s 4;
  }
  @keyframes monsterChew {
    0%,100% { transform: scale(1) rotate(0); }
    50% { transform: scale(1.2) rotate(-8deg); }
  }
  .monster-speech {
    background: white;
    border: 3px solid #e91e63;
    border-radius: 25px;
    padding: 12px 18px;
    margin: 10px auto;
    max-width: 340px;
    font-size: 1.2em;
    color: #c2185b;
    font-weight: bold;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
  .monster-speech::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 14px solid white;
  }
  .number-target {
    font-size: 3.5em;
    font-weight: bold;
    color: #e91e63;
    margin: 5px 0 15px;
    animation: pop 0.5s;
  }
  .big-num-choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 380px;
    margin: 0 auto;
  }
  .big-num-btn {
    height: 75px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(145deg, #f06292, #e91e63);
    color: white;
    font-size: 1.8em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #ad1457;
  }
  .big-num-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }

  /* Labirinto */
  .maze-info {
    text-align: center;
    background: #5d4037;
    color: white;
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 10px;
    font-size: 1.1em;
    font-weight: bold;
  }
  .maze-canvas-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
  }
  .maze-canvas {
    background: #fff8e1;
    border-radius: 20px;
    padding: 10px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
    touch-action: none;
  }
  .maze-canvas svg {
    display: block;
    width: 100%;
    height: auto;
    max-width: 600px;
    touch-action: none;
  }
  .maze-canvas svg .wall { fill: #6d4c41; }
  .maze-canvas svg .path { fill: #fff8e1; }
  .maze-canvas svg .player {
    transition: cx 0.05s linear, cy 0.05s linear;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  }
  .maze-canvas svg .goal-pulse {
    animation: goalPulse 1s ease-in-out infinite;
  }
  @keyframes goalPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .maze-trail {
    fill: rgba(255, 193, 7, 0.4);
  }

  /* Ligar */
  .match-area {
    background: #eceff1;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
    position: relative;
  }
  .match-row {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    gap: 15px;
    position: relative;
  }
  .match-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }
  .match-item {
    background: white;
    border: 4px solid #cfd8dc;
    border-radius: 15px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1.5em;
    font-weight: bold;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.06);
    position: relative;
    user-select: none;
  }
  .match-item:active { transform: scale(0.97); }
  .match-item.selected {
    border-color: #ff9800;
    background: #fff3e0;
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(255,152,0,0.3);
  }
  .match-item.matched {
    border-color: #4caf50;
    background: #e8f5e9;
    pointer-events: none;
    opacity: 0.85;
  }
  .match-item.wrong-flash {
    animation: shake 0.4s;
    border-color: #f44336;
  }
  .match-item.matched::after {
    content: '✓';
    position: absolute;
    top: -8px;
    right: -8px;
    background: #4caf50;
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    line-height: 26px;
    font-size: 0.9em;
  }
  .match-svg-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .match-category-picker {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    max-width: 600px;
    margin: 15px auto;
  }
  .match-cat-btn {
    padding: 18px 12px;
    border: none;
    border-radius: 18px;
    color: white;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 60px;
  }
  .match-cat-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
  .match-cat-btn .cat-emoji { font-size: 1.6em; }

  /* Desenhar letras */
  .trace-letter-picker {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 8px;
    max-width: 600px;
    margin: 0 auto 15px;
  }
  .trace-letter-btn {
    background: white;
    border: 3px solid #ff7043;
    color: #ff5722;
    border-radius: 12px;
    padding: 10px;
    font-size: 1.5em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 0 #d84315;
  }
  .trace-letter-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #d84315; }
  .trace-letter-btn.done {
    background: #4caf50;
    color: white;
    border-color: #2e7d32;
    box-shadow: 0 3px 0 #1b5e20;
  }
  .trace-canvas-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
  }
  .trace-canvas {
    background: #fffde7;
    border-radius: 20px;
    padding: 15px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    touch-action: none;
  }
  .trace-canvas svg {
    display: block;
    width: 100%;
    max-width: 360px;
    height: auto;
    touch-action: none;
  }
  .trace-canvas svg .guide-line {
    fill: none;
    stroke: #ffccbc;
    stroke-width: 28;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .trace-canvas svg .guide-arrow {
    fill: #ff5722;
    animation: arrowPulse 1.5s ease-in-out infinite;
  }
  @keyframes arrowPulse {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .trace-canvas svg .user-stroke {
    fill: none;
    stroke: #ff5722;
    stroke-width: 14;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .trace-canvas svg .start-dot {
    fill: #4caf50;
    animation: startPulse 1s ease-in-out infinite;
  }
  @keyframes startPulse {
    0%,100% { r: 12; }
    50% { r: 16; }
  }
  .trace-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .trace-btn {
    padding: 12px 22px;
    border: none;
    border-radius: 25px;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    color: white;
  }
  .trace-btn.clear-btn { background: #757575; box-shadow: 0 4px 0 #424242; }
  .trace-btn.clear-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #424242; }
  .trace-btn.next-trace-btn { background: #ff5722; box-shadow: 0 4px 0 #d84315; }
  .trace-btn.next-trace-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #d84315; }

  /* Vestir Panda */
  .panda-instruction {
    text-align: center;
    background: #424242;
    color: white;
    padding: 15px 20px;
    border-radius: 18px;
    margin-bottom: 15px;
    font-size: 1.2em;
    font-weight: bold;
  }
  .panda-instruction .en-word {
    display: inline-block;
    background: #ffd54f;
    color: #424242;
    padding: 4px 12px;
    border-radius: 12px;
    margin: 0 4px;
    font-size: 1.15em;
  }
  .panda-stage {
    background: linear-gradient(180deg, #fff9c4 0%, #ffe0b2 100%);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 320px;
    position: relative;
  }
  .panda-svg {

  /* Inglês */

  .play-audio-btn .icon { font-size: 1.5em; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
  .english-word-hint { margin-top: 15px; font-size: 1.1em; color: #888; font-style: italic; }
  .english-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);

  }
  .english-card {
    background: white; border: 4px solid #ffebee;
    border-radius: 20px; padding: 20px 10px; cursor: pointer;
    transition: all 0.15s; display: flex; flex-direction: column;

  .english-card.correct-flash { background: #c8e6c9; border-color: #4caf50; animation: pop 0.5s; }

  }

  /* Ecrã de boas-vindas para activar áudio */
  .welcome-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .welcome-screen .big-btn {
    background: linear-gradient(145deg, #ff4081, #c2185b);
    color: white; border: none;

  @media (max-width: 600px) {

  }
</style>
</head>
<body>
<div class="score">⭐ <span id="score">0</span></div>
<div class="container">
  <h1>🌟 Jogos da Matilde 🌟</h1>
  <p class="subtitle">Escolhe um jogo para começar!</p>

  <div class="replay-btn-area" id="replayArea" style="display:none">
    <button class="replay-instruction" onclick="replayInstruction()">
      🔊 Ouvir outra vez
    </button>
    <button class="replay-instruction" onclick="showVoicePicker()" style="margin-left:8px;background:#fff;border-color:#2196f3;color:#2196f3;box-shadow:0 4px 0 #1565c0">
      ⚙️ Voz
    </button>
  </div>

  <div class="menu" id="menu">
    <button class="menu-btn btn-name active" onclick="startGame('name', event)">✏️ Nome</button>
    <button class="menu-btn btn-alphabet" onclick="startGame('alphabet', event)">🎈 Balões</button>
    <button class="menu-btn btn-count" onclick="startGame('count', event)">🔢 Contar</button>
    <button class="menu-btn btn-bignum" onclick="startGame('bignum', event)">👹 Monstro</button>
    <button class="menu-btn btn-add" onclick="startGame('add', event)">➕ Somar</button>
    <button class="menu-btn btn-sub" onclick="startGame('sub', event)">➖ Tirar</button>
    <button class="menu-btn btn-colors" onclick="startGame('colors', event)">🎨 Cores</button>
    <button class="menu-btn btn-shapes" onclick="startGame('shapes', event)">⭐ Formas</button>
    <button class="menu-btn btn-paint" onclick="startGame('paint', event)">🖌️ Pintar</button>
    <button class="menu-btn btn-english" onclick="startGame('english', event)">🇬🇧 Inglês</button>
    <button class="menu-btn btn-panda" onclick="startGame('panda', event)">🐼 Vestir Panda</button>
    <button class="menu-btn btn-maze" onclick="startGame('maze', event)">🐭 Labirinto</button>
    <button class="menu-btn btn-match" onclick="startGame('match', event)">🔗 Ligar</button>
    <button class="menu-btn btn-trace" onclick="startGame('trace', event)">✍️ Desenhar Letras</button>
  </div>

  <div class="game-area" id="gameArea">
    <div class="welcome-screen">
      <div style="font-size:5em">👋</div>
      <h2 style="color:#ff4081;font-size:2em;margin-top:15px">Olá Matilde!</h2>
      <p style="font-size:1.3em;margin-top:15px;color:#555">Carrega no botão para começar os jogos!</p>
      <button class="big-btn" onclick="startApp()">🎮 Começar</button>
    </div>
  </div>
</div>

<!-- Modal seletor de voz -->
<div id="voicePicker" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;
     background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;
     padding:20px;overflow-y:auto">
  <div style="background:white;border-radius:20px;padding:25px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.3)">
    <div id="voicePickerContent"></div>
  </div>
</div>

<script>
let score = 0;
let lastInstruction = '';
let audioReady = false;

// ==================== ÁUDIO ====================
let ptVoice = null;
let enVoice = null;
let allPtVoices = [];
let noPortugueseVoice = false;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();

  // APENAS vozes de Portugal (pt-PT). Recusamos pt-BR.
  allPtVoices = voices.filter(v =>
    v.lang === 'pt-PT' ||
    v.lang === 'pt_PT' ||
    v.lang.toLowerCase().replace('_', '-') === 'pt-pt'
  );

  // Identificar vozes pt-BR para podermos filtrar conscientemente
  // (algumas vozes vêm marcadas como 'pt' genérico mas são brasileiras)
  if (allPtVoices.length === 0) {
    // Procurar vozes pt genérico mas excluir as que parecem ser brasileiras pelo nome
    const genericPt = voices.filter(v => {
      const lang = v.lang.toLowerCase();
      const name = v.name.toLowerCase();
      const isBrazilian = lang.includes('br') || lang === 'pt-br' || lang === 'pt_br' ||
                          name.includes('brasil') || name.includes('brazil') ||
                          name.includes('luciana') || name.includes('felipe') ||
                          name.includes('vitória') || name.includes('vitoria') ||
                          name.includes('camila') || name.includes('francisca');
      return lang.startsWith('pt') && !isBrazilian;
    });
    allPtVoices = genericPt;
  }

  // Preferir vozes de melhor qualidade (geralmente as que têm "Premium", "Enhanced" no nome)
  allPtVoices.sort((a, b) => {
    const aQ = /enhanced|premium|natural|neural/i.test(a.name) ? 1 : 0;
    const bQ = /enhanced|premium|natural|neural/i.test(b.name) ? 1 : 0;
    return bQ - aQ;
  });

  // Verificar se há preferência guardada
  const savedVoice = localStorage.getItem('matilde_voice');
  if (savedVoice) {
    const found = allPtVoices.find(v => v.name === savedVoice);
    if (found) ptVoice = found;
  }
  if (!ptVoice && allPtVoices.length > 0) {
    ptVoice = allPtVoices[0];
  }

  noPortugueseVoice = allPtVoices.length === 0;

  enVoice = voices.find(v => v.lang === 'en-US') ||
            voices.find(v => v.lang === 'en-GB') ||
            voices.find(v => v.lang.startsWith('en')) ||
            null;
}

if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, lang = 'pt-PT', remember = true) {
  if (!('speechSynthesis' in window)) return;
  if (!text) return;
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = lang.startsWith('pt') ? 0.92 : 0.8;
    utter.pitch = 1.1;

    if (lang.startsWith('pt')) {
      if (ptVoice) {
        utter.voice = ptVoice;
        utter.lang = ptVoice.lang;
      } else {
        utter.lang = 'pt-PT';
      }
    } else {
      if (enVoice) utter.voice = enVoice;
      utter.lang = lang;
    }

    window.speechSynthesis.speak(utter);
    if (remember && lang.startsWith('pt')) {
      lastInstruction = text;
      document.getElementById('replayArea').style.display = 'block';
    }
  } catch(e) {}
}

function showVoicePicker() {
  // Recarregar vozes ao abrir
  loadVoices();
  const voices = window.speechSynthesis.getVoices();
  const allPt = voices.filter(v => v.lang.toLowerCase().startsWith('pt'));

  const list = allPt.length > 0
    ? allPt.map(v => {
        const isPT = v.lang === 'pt-PT' || v.lang === 'pt_PT';
        const isSelected = ptVoice && v.name === ptVoice.name;
        return `
          <div onclick="selectVoice('${v.name.replace(/'/g, "\\'")}')"
               style="padding:12px 15px;margin:6px 0;border-radius:12px;cursor:pointer;
                      background:${isSelected ? '#ff4081' : (isPT ? '#e8f5e9' : '#fff3e0')};
                      color:${isSelected ? 'white' : '#333'};
                      border:2px solid ${isSelected ? '#c2185b' : '#ddd'};">
            <strong>${v.name}</strong>
            <span style="font-size:0.85em;opacity:0.8"> · ${v.lang} ${isPT ? '🇵🇹' : '🇧🇷'}</span>
            ${isSelected ? ' ✓' : ''}
          </div>
        `;
      }).join('')
    : '<p style="color:#d32f2f">⚠️ Não há vozes portuguesas instaladas neste dispositivo.</p>';

  document.getElementById('voicePickerContent').innerHTML = `
    <h2 style="color:#ff4081;text-align:center;margin-bottom:15px">🔊 Escolher voz</h2>
    <p style="text-align:center;color:#666;margin-bottom:15px;font-size:0.95em">
      As vozes verdes 🇵🇹 são de Portugal. As laranjas 🇧🇷 são do Brasil.
    </p>
    ${list}
    <button onclick="closeVoicePicker()"
            style="display:block;margin:20px auto 0;padding:12px 30px;background:#ff4081;
                   color:white;border:none;border-radius:25px;font-size:1.1em;
                   font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #c2185b">
      Fechar
    </button>
  `;
  document.getElementById('voicePicker').style.display = 'flex';
}

function selectVoice(name) {
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(x => x.name === name);
  if (v) {
    ptVoice = v;
    localStorage.setItem('matilde_voice', v.name);
    speak('Olá! Esta é a minha voz. Vamos brincar?', 'pt-PT', false);
    setTimeout(showVoicePicker, 100); // refresh para mostrar a selecção
  }
}

function closeVoicePicker() {
  document.getElementById('voicePicker').style.display = 'none';
}

function replayInstruction() {
  if (lastInstruction) speak(lastInstruction, 'pt-PT', false);
}

function playTone(freq, duration, type='sine') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
const sounds = {
  correct: () => playTone(523, 0.1, 'sine'),
  wrong: () => playTone(200, 0.2, 'sawtooth'),
  win: () => { playTone(523, 0.1); setTimeout(() => playTone(659, 0.1), 100); setTimeout(() => playTone(784, 0.2), 200); }
};
function updateScore(pts) { score += pts; document.getElementById('score').textContent = score; }

// Iniciar a app (necessário para activar áudio em alguns browsers)
function startApp() {
  audioReady = true;
  // Recarregar vozes (algumas browsers só carregam após interação)
  loadVoices();
  // "Despertar" o motor de fala
  speak('Olá Matilde! Vamos brincar?', 'pt-PT', false);

  // Após pequeno atraso, verificar se há voz portuguesa e avisar se necessário
  setTimeout(() => {
    loadVoices();
    if (noPortugueseVoice) {
      showNoVoiceWarning();
    } else {
      // Mostrar qual voz está a ser usada (para o utilizador poder mudar se quiser)
      document.getElementById('replayArea').style.display = 'block';
      renderNameGame();
    }
  }, 300);
}

function showNoVoiceWarning() {
  const voices = window.speechSynthesis.getVoices();
  const anyPt = voices.filter(v => v.lang.toLowerCase().startsWith('pt'));

  let helpHtml = '';
  if (anyPt.length > 0) {
    helpHtml = `
      <p style="margin-top:15px;font-size:1.05em;color:#555">
        Há vozes portuguesas do <strong>Brasil</strong> disponíveis, mas não de Portugal.
        Podes usar uma delas mesmo assim (vai ter sotaque brasileiro):
      </p>
      <button onclick="useBrazilianAnyway()" style="margin-top:10px;padding:12px 25px;background:#ff9800;color:white;border:none;border-radius:20px;font-size:1em;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #ef6c00">
        Usar voz brasileira na mesma
      </button>
    `;
  }

  document.getElementById('gameArea').innerHTML = `
    <div style="padding:25px 15px;text-align:left">
      <h2 style="color:#d32f2f;text-align:center;font-size:1.6em">⚠️ Sem voz portuguesa de Portugal</h2>
      <p style="margin-top:15px;font-size:1.1em;color:#333;text-align:center">
        Este dispositivo não tem nenhuma voz portuguesa de Portugal (pt-PT) instalada.
      </p>
      <p style="margin-top:20px;font-size:1em;color:#555">
        <strong>Como resolver:</strong>
      </p>
      <div style="background:#e3f2fd;padding:15px;border-radius:12px;margin-top:10px;font-size:0.95em;line-height:1.6">
        <strong>📱 No iPhone / iPad:</strong><br>
        Definições → Acessibilidade → Conteúdo Falado → Vozes → Português → Português (Portugal). Descarrega "Joana" ou "Catarina".
      </div>
      <div style="background:#fff3e0;padding:15px;border-radius:12px;margin-top:10px;font-size:0.95em;line-height:1.6">
        <strong>🤖 No Android:</strong><br>
        Definições → Acessibilidade → Saída de texto para voz → Motor preferido → Definições → Instalar dados de voz → Português (Portugal).
      </div>
      <div style="background:#f3e5f5;padding:15px;border-radius:12px;margin-top:10px;font-size:0.95em;line-height:1.6">
        <strong>💻 No computador:</strong><br>
        Tenta abrir no <strong>Microsoft Edge</strong> ou <strong>Safari</strong> (Mac) — geralmente têm vozes pt-PT incluídas. O Chrome no Windows pode não ter sem instalar pacote de idioma.
      </div>
      ${helpHtml}
      <button onclick="loadVoices(); startApp()" style="display:block;margin:25px auto 0;padding:14px 35px;background:#4caf50;color:white;border:none;border-radius:25px;font-size:1.15em;font-weight:bold;cursor:pointer;box-shadow:0 5px 0 #2e7d32">
        🔄 Já instalei, tentar outra vez
      </button>
    </div>
  `;
}

function useBrazilianAnyway() {
  const voices = window.speechSynthesis.getVoices();
  const ptBr = voices.find(v => v.lang === 'pt-BR' || v.lang === 'pt_BR') ||
               voices.find(v => v.lang.toLowerCase().startsWith('pt'));
  if (ptBr) {
    ptVoice = ptBr;
    localStorage.setItem('matilde_voice', ptBr.name);
    noPortugueseVoice = false;
  }
  document.getElementById('replayArea').style.display = 'block';
  renderNameGame();
}

function startGame(game, ev) {
  if (!audioReady) {
    audioReady = true;
    speak('', 'pt-PT', false);
  }
  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
  if (ev) ev.target.classList.add('active');
  if (game === 'name') renderNameGame();
  if (game === 'alphabet') renderAlphabetGame();
  if (game === 'count') renderCountGame();
  if (game === 'bignum') renderBigNumGame();
  if (game === 'add') renderMathGame('add');
  if (game === 'sub') renderMathGame('sub');
  if (game === 'colors') renderColorsGame();
  if (game === 'shapes') renderShapesGame();
  if (game === 'paint') renderPaintGame();
  if (game === 'english') renderEnglishGame();
  if (game === 'panda') renderPandaGame();
  if (game === 'maze') renderMazeGame();
  if (game === 'match') renderMatchGame();
  if (game === 'trace') renderTraceGame();
}

// ========== NOME ==========
const NAME = 'MATILDE';
const NAME_LETTERS_PT = { M: 'eme', A: 'á', T: 'tê', I: 'i', L: 'éle', D: 'dê', E: 'é' };
let nameProgress = 0;
let nameLetters = [];

function renderNameGame() {
  nameProgress = 0;
  const extras = ['B', 'P', 'R', 'O', 'N'];
  nameLetters = [...NAME.split(''), ...extras.slice(0, 3)].sort(() => Math.random() - 0.5);

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title">✏️ Escreve o teu nome!</h2>
    <p class="instruction">Toca nas letras pela ordem certa para escrever <strong style="color:#ff4081">MATILDE</strong></p>
    <div class="name-slots" id="nameSlots">
      ${NAME.split('').map((l, i) => `<div class="slot" id="slot-${i}"></div>`).join('')}
    </div>
    <div class="letters-pool">
      ${nameLetters.map((l, i) => `<button class="letter-btn" id="letter-${i}" onclick="pickLetter('${l}', ${i})">${l}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
  highlightNextSlot();
  setTimeout(() => speak(`Vamos escrever o teu nome! Procura a letra ${NAME_LETTERS_PT[NAME[0]]}`), 300);
}

function highlightNextSlot() {
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('next-hint'));
  const next = document.getElementById(`slot-${nameProgress}`);
  if (next) next.classList.add('next-hint');
}

function pickLetter(letter, btnIdx) {
  const expected = NAME[nameProgress];
  const slot = document.getElementById(`slot-${nameProgress}`);
  const btn = document.getElementById(`letter-${btnIdx}`);

  if (letter === expected) {
    slot.textContent = letter;
    slot.classList.add('filled', 'correct');
    slot.classList.remove('next-hint');
    btn.classList.add('used');
    nameProgress++;
    sounds.correct();
    updateScore(1);

    if (nameProgress === NAME.length) {
      sounds.win();
      const fb = document.getElementById('feedback');
      fb.innerHTML = `<span class="celebrate">🎉 Boa Matilde! Conseguiste! 🎉</span>`;
      updateScore(5);
      speak('Boa Matilde! Conseguiste escrever o teu nome!');
      setTimeout(() => {

  { e: '🎈', n: 'balões' }
];
let currentCount = 0;

function renderCountGame() {
  const count = Math.floor(Math.random() * 9) + 1;
  currentCount = count;
  const item = countEmojis[Math.floor(Math.random() * countEmojis.length)];
  const options = generateNumberOptions(count, 1, 10);

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title">🔢 Quantos vês?</h2>
    <p class="instruction">Conta os ${item.e} e escolhe o número certo!</p>

    <div class="number-choices">
      ${options.map(n => `<button class="number-btn" onclick="checkCount(${n})">${n}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
  setTimeout(() => speak(`Conta os ${item.n} e escolhe o número certo!`), 300);
}

function generateNumberOptions(correct, min, max) {
  const opts = new Set([correct]);
  while (opts.size < 3) {
    const r = Math.max(min, Math.min(max, correct + Math.floor(Math.random() * 5) - 2));
    if (r !== correct) opts.add(r);
  }
  return [...opts].sort(() => Math.random() - 0.5);
}

function checkCount(n) {
  const fb = document.getElementById('feedback');
  if (n === currentCount) {
    sounds.win();
    fb.innerHTML = `<span class="celebrate">🎉 Certo! Eram ${n}! ⭐</span>`;
    updateScore(3);
    speak(`Certo! Eram ${numToWord(n)}!`, 'pt-PT', false);

    sounds.wrong();
    fb.textContent = `Quase! Tenta contar outra vez 🤔`;
    speak('Quase! Tenta contar outra vez!', 'pt-PT', false);
    setTimeout(() => fb.textContent = '', 1800);
  }
}

function numToWord(n) {
  const words = ['zero', 'um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove', 'dez'];
  return words[n] || n.toString();
}

const mathEmojis = [
  { e: '🍎', n: 'maçãs' }, { e: '🍓', n: 'morangos' }, { e: '🌟', n: 'estrelas' },
  { e: '🐝', n: 'abelhas' }, { e: '🦋', n: 'borboletas' }, { e: '🌸', n: 'flores' },
  { e: '🎈', n: 'balões' }, { e: '🐞', n: 'joaninhas' }
];
let mathAnswer = 0;
let mathMode = 'add';

function renderMathGame(mode) {
  mathMode = mode;
  let a, b, op, visualHtml, title, instructionText, btnClass;

  if (mode === 'add') {
    a = Math.floor(Math.random() * 5) + 1;
    b = Math.floor(Math.random() * 5) + 1;
    if (a + b > 10) b = 10 - a;
    if (b < 1) b = 1;
    mathAnswer = a + b;
    op = '+';
    title = '➕ Vamos Somar!';
    btnClass = 'add-btn';
  } else {
    a = Math.floor(Math.random() * 7) + 3;
    b = Math.floor(Math.random() * (a - 1)) + 1;
    mathAnswer = a - b;
    op = '−';
    title = '➖ Vamos Tirar!';
    btnClass = 'sub-btn';
  }

  const item = mathEmojis[Math.floor(Math.random() * mathEmojis.length)];
  const options = generateNumberOptions(mathAnswer, 0, 10);

  if (mode === 'add') {
    instructionText = `Tens ${numToWord(a)} ${item.n}, juntas mais ${numToWord(b)}. Quantos ${item.n} ficam ao todo?`;
    visualHtml = `
      <div class="math-group">${Array(a).fill(0).map(() => `<span class="math-item">${item.e}</span>`).join('')}</div>
      <span class="math-sign">➕</span>
      <div class="math-group">${Array(b).fill(0).map(() => `<span class="math-item">${item.e}</span>`).join('')}</div>
      <span class="math-sign">=</span>
      <span style="font-size:2em;color:#9c27b0;font-weight:bold">?</span>
    `;
  } else {
    instructionText = `Tens ${numToWord(a)} ${item.n} e tiras ${numToWord(b)}. Quantos ${item.n} ficam?`;
    visualHtml = `
      <div class="math-group sub-style">
        ${Array(a).fill(0).map((_, i) => `<span class="math-item" style="${i < b ? 'opacity:0.2;text-decoration:line-through;filter:grayscale(1);' : ''}">${item.e}</span>`).join('')}
      </div>
      <span class="math-sign" style="font-size:1em;color:#5e35b1">(tira ${b})</span>
      <span class="math-sign">=</span>
      <span style="font-size:2em;color:#5e35b1;font-weight:bold">?</span>
    `;
  }

  const mainColor = mode === 'add' ? '#9c27b0' : '#5e35b1';

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:${mainColor}">${title}</h2>
    <p class="instruction">${instructionText}</p>
    <div class="math-equation" style="font-size:1.3em;color:${mainColor}">
      <span style="font-size:2em">${a}</span>
      <span style="font-size:1.8em">${op}</span>
      <span style="font-size:2em">${b}</span>
      <span style="font-size:1.8em">=</span>
      <span style="font-size:2em">?</span>
    </div>
    <div class="math-equation">${visualHtml}</div>
    <div class="math-choices">
      ${options.map(n => `<button class="math-btn ${btnClass}" onclick="checkMath(${n})">${n}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
  setTimeout(() => speak(instructionText), 300);
}

function checkMath(n) {
  const fb = document.getElementById('feedback');
  if (n === mathAnswer) {
    sounds.win();
    fb.innerHTML = `<span class="celebrate">🎉 Certinho! É ${n}! 🌟</span>`;

}

let currentDrawing = null;
let paintProgress = 0;
let selectedColor = null;

function colorToSay(name) {
  return name === 'cor-de-rosa' ? 'cor de rosa' : name;
}

function renderPaintGame() {
  currentDrawing = paintDrawings[Math.floor(Math.random() * paintDrawings.length)];
  paintProgress = 0;
  selectedColor = null;
  drawPaintScreen();
  setTimeout(() => {
    const part = currentDrawing.parts[0];
    speak(`Vamos pintar ${currentDrawing.name}! Primeiro escolhe a cor ${colorToSay(part.color)} para pintar ${part.label}`);
  }, 400);
}

function drawPaintScreen(message, sayMessage) {
  const draw = currentDrawing;
  const currentPart = draw.parts[paintProgress];
  const done = paintProgress >= draw.parts.length;
  const colorEmoji = { vermelho:'🔴', azul:'🔵', amarelo:'🟡', verde:'🟢', 'cor-de-rosa':'🌸', laranja:'🟠', roxo:'🟣', castanho:'🟤' };

  let instructionHtml;
  if (message) {
    instructionHtml = message;
  } else if (done) {
    instructionHtml = `<span class="celebrate">🎉 Acabaste ${draw.name}! Está linda! 🎉</span>`;
  } else if (!selectedColor) {
    instructionHtml = `Escolhe a cor <strong>${currentPart.color}</strong> ${colorEmoji[currentPart.color] || ''} para pintar <strong>${currentPart.label}</strong>`;
  } else {
    instructionHtml = `Agora toca em <strong>${currentPart.label}</strong> no desenho! 👆`;
  }

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title">🖌️ Pinta — ${draw.name}</h2>
    <div class="paint-instruction">${instructionHtml}</div>
    <div class="paint-canvas-wrap">
      <div class="paint-canvas">
        <svg viewBox="${draw.viewBox}" id="paintSvg">
          ${draw.parts.map(p => p.svg).join('')}
        </svg>
      </div>
    </div>
    <div class="palette">
      ${paintColors.map(c => `
        <div class="paint-color ${!done && !selectedColor && c.name === currentPart.color ? 'required' : ''} ${selectedColor === c.name ? 'selected' : ''}"
             style="background:${c.hex}" data-color="${c.name}"
             onclick="pickPaint('${c.name}')" title="${c.name}"></div>
      `).join('')}
    </div>
    ${done ? `<button class="next-btn" onclick="renderPaintGame()">Pintar outro desenho! 🎨</button>` : ''}
  `;

  for (let i = 0; i < paintProgress; i++) {
    const p = draw.parts[i];
    const colorHex = paintColors.find(c => c.name === p.color).hex;
    const el = document.querySelector(`#paintSvg [data-id="${p.id}"]`);
    if (el) el.setAttribute('fill', colorHex);
  }

  document.querySelectorAll('#paintSvg .paintable').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.getAttribute('data-id');
      tryPaint(id, el);
    });
  });

  if (sayMessage) speak(sayMessage);
}

function pickPaint(name) {
  const expected = currentDrawing.parts[paintProgress];
  if (!expected) return;
  selectedColor = name;
  if (name === expected.color) {
    sounds.correct();
    drawPaintScreen(null, `Boa! Agora toca em ${expected.label} no desenho!`);
  } else {
    sounds.wrong();
    drawPaintScreen(`Hmm, essa não é a cor certa. Procura <strong>${expected.color}</strong>!`);
    speak(`Essa é ${colorToSay(name)}. Procura a cor ${colorToSay(expected.color)}!`, 'pt-PT', false);
    selectedColor = null;
    setTimeout(() => drawPaintScreen(), 2000);
  }
}

function tryPaint(partId, el) {
  if (!selectedColor) {
    drawPaintScreen(`👆 Primeiro escolhe uma cor lá em baixo!`);
    speak('Primeiro escolhe uma cor lá em baixo!', 'pt-PT', false);
    setTimeout(drawPaintScreen, 1800);
    return;
  }
  const expected = currentDrawing.parts[paintProgress];
  if (!expected) return;
  if (partId !== expected.id) {
    sounds.wrong();
    drawPaintScreen(`🤔 Essa não é a parte certa! Procura <strong>${expected.label}</strong>`);
    speak(`Essa não é a parte certa. Procura ${expected.label}!`, 'pt-PT', false);
    setTimeout(drawPaintScreen, 2200);
    return;
  }
  const hex = paintColors.find(c => c.name === selectedColor).hex;
  el.setAttribute('fill', hex);
  sounds.correct();
  updateScore(2);
  paintProgress++;
  selectedColor = null;

  if (paintProgress === currentDrawing.parts.length) {
    sounds.win();
    updateScore(5);
    drawPaintScreen();
    speak(`Boa Matilde! Acabaste ${currentDrawing.name}! Está lindíssima!`, 'pt-PT', false);
  } else {
    const next = currentDrawing.parts[paintProgress];
    drawPaintScreen();
    speak(`Muito bem! Agora escolhe a cor ${colorToSay(next.color)} para pintar ${next.label}`, 'pt-PT', false);
  }
}

// ========== ALFABETO (BALÕES) ==========
const ALPHABET = ['A','B','C','D','E','F','G','H','I','J','L','M','N','O','P','Q','R','S','T','U','V','X','Z'];
const LETTER_SOUNDS_PT = {
  A:'á', B:'bê', C:'cê', D:'dê', E:'é', F:'éfe', G:'guê', H:'agá',
  I:'i', J:'jota', L:'éle', M:'eme', N:'ene', O:'ó', P:'pê', Q:'quê',
  R:'érre', S:'ésse', T:'tê', U:'u', V:'vê', X:'xis', Z:'zê'
};
const BALLOON_COLORS = ['#ef5350','#42a5f5','#66bb6a','#ffa726','#ab47bc','#26c6da','#ec407a','#7e57c2','#26a69a','#ff7043'];

let alphabetTarget = '';
let alphabetBalloonsLeft = 0;
let alphabetCorrectFound = false;
let balloonSpawnInterval = null;
let alphabetActive = false;

function renderAlphabetGame() {
  alphabetActive = true;
  pickNewAlphabetTarget();
}

function pickNewAlphabetTarget() {
  alphabetTarget = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  alphabetCorrectFound = false;
  alphabetBalloonsLeft = 0;

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#00897b">🎈 Estoura os Balões!</h2>
    <div class="balloon-target">
      Estoura o <span class="target-letter">${alphabetTarget}</span>
    </div>
    <div class="balloon-area" id="balloonArea"></div>
    <div class="balloon-progress" id="balloonProgress">Toca no balão certo! 👆</div>
  `;

  setTimeout(() => speak(`Estoura o ${LETTER_SOUNDS_PT[alphabetTarget]}`), 300);

  // Limpar interval anterior
  if (balloonSpawnInterval) clearInterval(balloonSpawnInterval);

  // Spawn balões inicialmente
  spawnBalloon(true); // primeiro é o correcto
  for (let i = 0; i < 3; i++) {
    setTimeout(() => spawnBalloon(false), 600 * (i + 1));
  }

  // Continuar a spawnar balões
  balloonSpawnInterval = setInterval(() => {
    if (!alphabetActive) {
      clearInterval(balloonSpawnInterval);
      return;
    }
    if (alphabetCorrectFound) return;
    // 30% chance de ser a letra certa, para garantir que aparece com frequência
    const isCorrect = Math.random() < 0.3;
    spawnBalloon(isCorrect);
  }, 1800);
}

function spawnBalloon(forceCorrect) {
  const area = document.getElementById('balloonArea');
  if (!area || !alphabetActive) return;

  let letter;
  if (forceCorrect) {
    letter = alphabetTarget;
  } else {
    // Letra diferente da alvo
    do {
      letter = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
    } while (letter === alphabetTarget);
  }

  const balloon = document.createElement('div');
  balloon.className = 'balloon';
  balloon.textContent = letter;
  const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
  balloon.style.background = color;

  // Posição horizontal aleatória
  const areaWidth = area.offsetWidth;
  const left = 10 + Math.random() * (areaWidth - 90);
  balloon.style.left = left + 'px';

  // Duração de subida aleatória
  const duration = 6 + Math.random() * 3;
  balloon.style.animation = `floatUp ${duration}s linear forwards`;

  balloon.onclick = () => popBalloon(balloon, letter);

  area.appendChild(balloon);
  alphabetBalloonsLeft++;

  // Remover quando chega ao topo
  setTimeout(() => {
    if (balloon.parentNode) {
      balloon.parentNode.removeChild(balloon);
      alphabetBalloonsLeft--;
    }
  }, duration * 1000);
}

// Adicionar keyframe dinamicamente
if (!document.getElementById('balloon-keyframes')) {
  const style = document.createElement('style');
  style.id = 'balloon-keyframes';
  style.textContent = `
    @keyframes floatUp {
      from { bottom: -100px; }
      to { bottom: 500px; }
    }
  `;
  document.head.appendChild(style);
}

function popBalloon(balloon, letter) {
  if (balloon.classList.contains('popping')) return;

  if (letter === alphabetTarget) {
    // Acertou!
    balloon.classList.add('popping');
    sounds.win();
    updateScore(3);
    alphabetCorrectFound = true;

    const progress = document.getElementById('balloonProgress');
    if (progress) {
      progress.innerHTML = `<span class="celebrate" style="color:#00897b">🎉 Boa! Era o ${alphabetTarget}!</span>`;
    }
    speak(`Boa! ${LETTER_SOUNDS_PT[alphabetTarget]}!`, 'pt-PT', false);

    // Limpar balões existentes e ir para a próxima letra
    setTimeout(() => {
      if (alphabetActive) pickNewAlphabetTarget();
    }, 1800);
  } else {
    // Errou
    balloon.classList.add('wobble');
    sounds.wrong();
    setTimeout(() => balloon.classList.remove('wobble'), 400);
    speak(`Esse é o ${LETTER_SOUNDS_PT[letter]}. Procura o ${LETTER_SOUNDS_PT[alphabetTarget]}!`, 'pt-PT', false);
  }
}

// Parar balões quando se muda de jogo
const originalStartGame = startGame;
startGame = function(game, ev) {
  alphabetActive = (game === 'alphabet');
  if (balloonSpawnInterval && game !== 'alphabet') {
    clearInterval(balloonSpawnInterval);
    balloonSpawnInterval = null;
  }
  return originalStartGame(game, ev);
};

function renderBigNumGame() {

function getCookieName(emoji) {
  const names = {
    '🍪':'bolachinhas', '🍩':'donuts', '🍰':'bolinhos', '🧁':'queques',
    '🍫':'chocolates', '🍬':'rebuçados', '🍭':'chupa-chupas', '🍦':'gelados'
  };
  return names[emoji] || 'docinhos';
}

function checkBigNum(n) {
  const fb = document.getElementById('feedback');
  if (n === bigNumTarget) {
    sounds.win();
    updateScore(5);

    // Animar a alimentar o monstro
    const scene = document.querySelector('.monster-scene');
    const monsterEl = document.getElementById('monsterEl');

    // Criar bolachas a voar para o monstro
    const cookiesRow = document.createElement('div');
    cookiesRow.className = 'cookies-display';
    cookiesRow.innerHTML = Array(Math.min(n, 12)).fill(0).map((_, i) =>
      `<span class="cookie" style="animation-delay:${i*0.05}s">${currentCookie}</span>`
    ).join('');
    scene.appendChild(cookiesRow);

    // Animar bolachas a serem comidas
    setTimeout(() => {
      cookiesRow.querySelectorAll('.cookie').forEach((c, i) => {
        setTimeout(() => c.classList.add('eaten'), i * 80);
      });
      monsterEl.classList.add('chewing');
    }, 400);

    fb.innerHTML = `<span class="celebrate" style="color:#e91e63">🎉 Yummy! Eram ${NUM_WORDS_TEEN[bigNumTarget]}! 😋</span>`;
    speak(`Boa Matilde! ${NUM_WORDS_TEEN[bigNumTarget]}! Yummy!`, 'pt-PT', false);

    setTimeout(renderBigNumGame, 3000);
  } else {
    sounds.wrong();
    fb.textContent = `Esse é ${NUM_WORDS_TEEN[n] || n}. Procura ${NUM_WORDS_TEEN[bigNumTarget]}!`;
    speak(`Esse é ${NUM_WORDS_TEEN[n] || n}. Procura ${NUM_WORDS_TEEN[bigNumTarget]}!`, 'pt-PT', false);
    setTimeout(() => fb.textContent = '', 2500);
  }
}

let pandaLevelIdx = 0;
let pandaRoundIdx = 0;
let pandaTotalRounds = 0;
let pandaCurrentRoundCount = 0;

let pandaCurrentTarget = null;
let pandaAnswered = false;

function renderPandaGame() {
  pandaLevelIdx = 0;
  pandaRoundIdx = 0;
  pandaWornLayers = [];
  pandaTotalRounds = PANDA_LEVELS.reduce((s, l) => s + l.rounds, 0);
  pandaCurrentRoundCount = 0;
  nextPandaRound(true);
}

function nextPandaRound(isStartOfLevel) {
  const level = PANDA_LEVELS[pandaLevelIdx];
  if (!level) {
    // Acabou tudo!
    showPandaCompletion();
    return;
  }

  if (pandaRoundIdx >= level.rounds) {
    // Próximo nível
    pandaLevelIdx++;
    pandaRoundIdx = 0;
    nextPandaRound(true);
    return;
  }

  pandaCurrentRoundCount++;
  pandaAnswered = false;

  // Escolher item e cor
  const item = level.items[Math.floor(Math.random() * level.items.length)];
  const colorKeys = Object.keys(PANDA_COLORS);
  const colorKey = colorKeys[Math.floor(Math.random() * colorKeys.length)];
  const color = PANDA_COLORS[colorKey];

  pandaCurrentTarget = { item, colorKey, color };

  // Gerar opções: 4 cards estratégicos para forçar a aprender o vocabulário da peça.
  // Regra: PELO MENOS 2 peças DIFERENTES com a MESMA COR da correta (assim não pode adivinhar só pela cor).
  // O ideal são 3-4 peças com a mesma cor.
  const choices = [{ item, colorKey }];

  if (item.useColor) {
    // Adicionar OUTRAS peças com a MESMA cor que a alvo - isto é o crítico
    const otherItemsSameColor = level.items
      .filter(i => i.en !== item.en && i.useColor)
      .sort(() => Math.random() - 0.5);

    // Adicionar até 2-3 peças com a mesma cor (distratores fortes)
    const numSameColor = Math.min(otherItemsSameColor.length, 2 + Math.floor(Math.random() * 2));
    for (let k = 0; k < numSameColor && choices.length < 4; k++) {
      choices.push({ item: otherItemsSameColor[k], colorKey });
    }

    // Se sobrar espaço, adicionar a peça correta noutra cor (distrator mais fraco)
    if (choices.length < 4) {
      const otherColors = colorKeys.filter(c => c !== colorKey).sort(() => Math.random() - 0.5);
      choices.push({ item, colorKey: otherColors[0] });
    }

    // Se ainda sobrar, mais peças diferentes com a mesma cor ou outras combinações
    while (choices.length < 4) {
      const remaining = level.items.filter(i =>
        !choices.some(c => c.item.en === i.en && c.colorKey === colorKey)
      );
      if (remaining.length > 0) {
        const ri = remaining[Math.floor(Math.random() * remaining.length)];
        choices.push({ item: ri, colorKey: ri.useColor ? colorKey : 'red' });
      } else {
        // Fallback: peça aleatória com cor aleatória
        const ri = level.items[Math.floor(Math.random() * level.items.length)];
        const rc = colorKeys[Math.floor(Math.random() * colorKeys.length)];
        if (!choices.some(c => c.item.en === ri.en && c.colorKey === rc)) {
          choices.push({ item: ri, colorKey: rc });
        } else {
          break;
        }
      }
    }
  } else {
    // Item sem cor (óculos, etc.) - basta variar items
    const otherItems = level.items.filter(i => i.en !== item.en).sort(() => Math.random() - 0.5);
    let i2 = 0;
    while (choices.length < 4 && i2 < otherItems.length) {
      const otherItem = otherItems[i2++];
      const cKey = otherItem.useColor ? colorKeys[Math.floor(Math.random() * colorKeys.length)] : 'red';
      choices.push({ item: otherItem, colorKey: cKey });
    }
    // Se faltarem, encher com peças com cor
    while (choices.length < 4) {
      const ri = level.items[Math.floor(Math.random() * level.items.length)];
      const rc = colorKeys[Math.floor(Math.random() * colorKeys.length)];
      if (!choices.some(c => c.item.en === ri.en && c.colorKey === rc)) {
        choices.push({ item: ri, colorKey: rc });
      } else {
        break;
      }
    }
  }

  choices.sort(() => Math.random() - 0.5);

  // Construir instrução
  let instructionHtml, instructionSpeak;
  if (item.useColor) {
    instructionHtml = `Put the <span class="en-word">${color.en || colorKey}</span> <span class="en-word">${item.en}</span> on the panda!`;
    instructionSpeak = `Put the ${colorKey} ${item.en} on the panda!`;
  } else {
    instructionHtml = `Put the <span class="en-word">${item.en}</span> on the panda!`;
    instructionSpeak = `Put the ${item.en} on the panda!`;
  }

  // Construir vista do panda com camadas atuais
  let pandaHtml = `<div class="panda-svg">${PANDA_BASE}`;
  pandaWornLayers.forEach(layer => {
    const svgFn = CLOTHING_SVG[layer.svgKey];
    if (svgFn) {
      pandaHtml += `<div class="clothing-item">${svgFn(layer.color || '#888')}</div>`;
    }
  });
  pandaHtml += `</div>`;

  // Progresso visual
  let progressDots = '';
  let cum = 0;
  for (let lvl = 0; lvl < PANDA_LEVELS.length; lvl++) {
    for (let r = 0; r < PANDA_LEVELS[lvl].rounds; r++) {
      cum++;
      let cls = 'dot';
      if (cum < pandaCurrentRoundCount) cls += ' done';
      else if (cum === pandaCurrentRoundCount) cls += ' current';
      progressDots += `<span class="${cls}"></span>`;
    }
  }

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#424242">🐼 Dress the Panda!</h2>
    <div class="panda-instruction">${instructionHtml}</div>
    <div class="panda-stage">${pandaHtml}</div>
    <div class="panda-progress">${progressDots}</div>
    <div class="clothing-choices">
      ${choices.map((c, idx) => {
        const svgFn = CLOTHING_SVG[c.item.svgKey];
        const colorHex = c.item.useColor ? PANDA_COLORS[c.colorKey].hex : '#666';
        const previewViewBox = CLOTHING_PREVIEW_VIEWBOX[c.item.svgKey] || '0 0 220 280';
        return `
          <div class="clothing-card" id="panda-card-${idx}" onclick="checkPandaChoice('${c.item.svgKey}','${c.colorKey}',${idx})">
            <div class="clothing-preview">
              <svg viewBox="${previewViewBox}" preserveAspectRatio="xMidYMid meet">${getMiniPreview(c.item.svgKey, colorHex)}</svg>
            </div>
            <div class="pt-label">${c.item.useColor ? PANDA_COLORS[c.colorKey].pt + ' ' + c.item.pt : c.item.pt}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="text-align:center;margin-top:15px">
      <button class="replay-instruction" onclick="speak('${instructionSpeak}', 'en-US', false)" style="color:#d32f2f;border-color:#d32f2f;box-shadow:0 4px 0 #b71c1c">
        🔊 Listen again
      </button>
    </div>
  `;

  // Falar a instrução em inglês (sem introdução em português - imersão total)
  setTimeout(() => speak(instructionSpeak, 'en-US', false), 400);
}

function getMiniPreview(svgKey, color) {
  const fn = CLOTHING_SVG[svgKey];
  if (!fn) return '';
  // Extrair só o conteúdo SVG (sem o <svg> wrapper) da função
  const fullSvg = fn(color);
  const match = fullSvg.match(/<svg[^>]*>([\s\S]*)<\/svg>/);
  return match ? match[1] : '';
}

function checkPandaChoice(svgKey, colorKey, cardIdx) {
  if (pandaAnswered) return;
  const card = document.getElementById(`panda-card-${cardIdx}`);
  const isItemRight = svgKey === pandaCurrentTarget.item.svgKey;
  const isColorRight = !pandaCurrentTarget.item.useColor || colorKey === pandaCurrentTarget.colorKey;

  if (isItemRight && isColorRight) {
    pandaAnswered = true;
    card.classList.add('correct-flash');
    sounds.win();
    updateScore(4);

    // Vestir o panda
    const colorHex = pandaCurrentTarget.item.useColor ? pandaCurrentTarget.color.hex : '#666';
    pandaWornLayers.push({ svgKey: pandaCurrentTarget.item.svgKey, color: colorHex });

    // Som de sucesso em inglês + português
    const itemEn = pandaCurrentTarget.item.en;
    speak('Great job!', 'en-US', false);
    setTimeout(() => speak(itemEn, 'en-US', false), 800);

    setTimeout(() => {
      pandaRoundIdx++;
      nextPandaRound(false);
    }, 2200);
  } else {
    card.classList.add('wrong-flash');
    sounds.wrong();
    setTimeout(() => card.classList.remove('wrong-flash'), 600);
    // Dica: repetir a instrução em inglês
    setTimeout(() => {
      const itemEn = pandaCurrentTarget.item.en;
      const colorEn = pandaCurrentTarget.colorKey;
      if (pandaCurrentTarget.item.useColor) {
        speak(`Try again. Find the ${colorEn} ${itemEn}.`, 'en-US', false);
      } else {
        speak(`Try again. Find the ${itemEn}.`, 'en-US', false);
      }
    }, 700);
  }
}

function showPandaCompletion() {
  // Mostrar panda completamente vestido
  let pandaHtml = `<div class="panda-svg">${PANDA_BASE}`;
  pandaWornLayers.forEach(layer => {
    const svgFn = CLOTHING_SVG[layer.svgKey];
    if (svgFn) {
      pandaHtml += `<div class="clothing-item">${svgFn(layer.color || '#888')}</div>`;
    }
  });
  pandaHtml += `</div>`;

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#424242">🎉 Look at the Panda! 🐼</h2>
    <div class="panda-stage">${pandaHtml}</div>
    <div class="feedback"><span class="celebrate">🌟 Wow! Great job! 🌟</span></div>
    <button class="next-btn" onclick="renderPandaGame()">Dress another panda! 🐼</button>
  `;
  sounds.win();
  speak('Wow! Look at the panda! Well done!', 'en-US', false);
}

function renderMazeGame() {
  const m = MAZES[Math.floor(Math.random() * MAZES.length)];

function startMaze(maze) {
  // Encontrar start e goal
  let start = null, goal = null;
  for (let y = 0; y < maze.grid.length; y++) {
    for (let x = 0; x < maze.grid[y].length; x++) {
      const c = maze.grid[y][x];
      if (c === '2') start = { x, y };
      if (c === '3') goal = { x, y };
    }
  }

  if (!start || !goal) return;

  const cellSize = 40;
  const cols = maze.grid[0].length;
  const rows = maze.grid.length;
  const width = cols * cellSize;
  const height = rows * cellSize;

  mazeState = {
    maze,
    cellSize,
    cols, rows, width, height,
    player: { ...start },
    goal,
    trail: [`${start.x},${start.y}`],
    won: false
  };

  // Construir SVG do labirinto
  let svgCells = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const c = maze.grid[y][x];
      const isWall = c === '1';
      svgCells += `<rect x="${x*cellSize}" y="${y*cellSize}" width="${cellSize}" height="${cellSize}" class="${isWall ? 'wall' : 'path'}"/>`;
    }
  }

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#5d4037">🐭 Labirinto</h2>
    <div class="maze-info">Ajuda o ${maze.theme.player} a chegar ao ${maze.theme.goal}! Arrasta o dedo!</div>

          ${svgCells}
          <g id="trail"></g>
          <text x="${goal.x*cellSize + cellSize/2}" y="${goal.y*cellSize + cellSize*0.78}"
                text-anchor="middle" font-size="${cellSize*0.85}" class="goal-pulse">${maze.theme.goal}</text>
          <text id="playerEl" x="${start.x*cellSize + cellSize/2}" y="${start.y*cellSize + cellSize*0.78}"
                text-anchor="middle" font-size="${cellSize*0.85}" class="player">${maze.theme.player}</text>
        </svg>
      </div>
    </div>
    <div style="text-align:center">
      <button class="trace-btn clear-btn" onclick="renderMazeGame()">🔄 Outro labirinto</button>
    </div>
    <div class="feedback" id="feedback"></div>

  speak(`Ajuda o ${maze.theme.playerName} a chegar! Arrasta o dedo pelo caminho!`);

function setupMazeControls() {
  const svg = document.getElementById('mazeSvg');
  if (!svg) return;

  const getCellFromEvent = (e) => {
    const rect = svg.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    const x = point.clientX - rect.left;
    const y = point.clientY - rect.top;
    // Converter para coords SVG
    const svgX = (x / rect.width) * mazeState.width;
    const svgY = (y / rect.height) * mazeState.height;
    const col = Math.floor(svgX / mazeState.cellSize);
    const row = Math.floor(svgY / mazeState.cellSize);
    return { x: col, y: row };
  };

  const tryMoveTo = (cell) => {
    if (mazeState.won) return;
    if (cell.x < 0 || cell.y < 0 || cell.x >= mazeState.cols || cell.y >= mazeState.rows) return;

    const cellChar = mazeState.maze.grid[cell.y][cell.x];
    if (cellChar === '1') return; // parede

    // Tem de ser adjacente à posição atual (4-direccional) OU continuação da trilha
    const cur = mazeState.player;
    const dx = Math.abs(cell.x - cur.x);
    const dy = Math.abs(cell.y - cur.y);
    if (dx + dy !== 1) {
      // Verificar se está na trilha (para permitir voltar atrás)
      const key = `${cell.x},${cell.y}`;
      if (!mazeState.trail.includes(key)) return;
    }

    // Mover
    mazeState.player = cell;
    const key = `${cell.x},${cell.y}`;
    if (!mazeState.trail.includes(key)) {
      mazeState.trail.push(key);
    } else {
      // Cortar trilha quando volta atrás
      const idx = mazeState.trail.indexOf(key);
      mazeState.trail = mazeState.trail.slice(0, idx + 1);
    }
    updateMazeView();

    // Verificar vitória
    if (cell.x === mazeState.goal.x && cell.y === mazeState.goal.y) {
      mazeState.won = true;
      sounds.win();
      updateScore(5);
      const fb = document.getElementById('feedback');
      fb.innerHTML = `<span class="celebrate">🎉 Conseguiste! 🎉</span>`;
      speak('Boa Matilde! Conseguiste!', 'pt-PT', false);
      setTimeout(renderMazeGame, 2500);
    } else {
      playTone(440 + Math.random() * 200, 0.05);
    }
  };

  const handleStart = (e) => {
    e.preventDefault();
    const cell = getCellFromEvent(e);
    // Só inicia drag se tocar no jogador ou numa célula adjacente
    if (cell.x === mazeState.player.x && cell.y === mazeState.player.y) {
      mazeDragging = true;
    } else {
      const dx = Math.abs(cell.x - mazeState.player.x);
      const dy = Math.abs(cell.y - mazeState.player.y);
      if (dx + dy === 1) {
        mazeDragging = true;
        tryMoveTo(cell);
      }
    }
  };

  const handleMove = (e) => {
    if (!mazeDragging) return;
    e.preventDefault();
    const cell = getCellFromEvent(e);
    if (cell.x !== mazeState.player.x || cell.y !== mazeState.player.y) {
      tryMoveTo(cell);
    }
  };

  const handleEnd = (e) => {
    mazeDragging = false;
  };

  svg.addEventListener('touchstart', handleStart, { passive: false });
  svg.addEventListener('touchmove', handleMove, { passive: false });
  svg.addEventListener('touchend', handleEnd);
  svg.addEventListener('mousedown', handleStart);
  svg.addEventListener('mousemove', handleMove);
  svg.addEventListener('mouseup', handleEnd);
  svg.addEventListener('mouseleave', handleEnd);
}

function updateMazeView() {
  const trailEl = document.getElementById('trail');
  const cs = mazeState.cellSize;
  if (trailEl) {
    trailEl.innerHTML = mazeState.trail.map(key => {
      const [x, y] = key.split(',').map(Number);
      return `<circle cx="${x*cs + cs/2}" cy="${y*cs + cs/2}" r="${cs*0.18}" class="maze-trail"/>`;
    }).join('');
  }
  const playerEl = document.getElementById('playerEl');
  if (playerEl) {
    playerEl.setAttribute('x', mazeState.player.x * cs + cs/2);
    playerEl.setAttribute('y', mazeState.player.y * cs + cs*0.78);
  }
}

function shuffleArr(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

let matchState = null;

function renderMatchGame() {
  // Mostrar seletor de categoria
  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#455a64">🔗 Jogo de Ligar</h2>
    <p class="instruction">Escolhe o tipo de jogo!</p>
    <div class="match-category-picker">
      ${MATCH_CATEGORIES.map(c => `
        <button class="match-cat-btn" style="background:${c.color}" onclick="startMatchCategory('${c.id}')">
          <span class="cat-emoji">${c.emoji}</span>
          <span>${c.title}</span>
        </button>
      `).join('')}
    </div>
  `;
  setTimeout(() => speak('Escolhe um jogo de ligar!'), 300);
}

function startMatchCategory(catId) {
  const cat = MATCH_CATEGORIES.find(c => c.id === catId);
  if (!cat) return;

  const pairs = cat.pairs();
  // Lado esquerdo: ordem original. Lado direito: baralhado.
  const lefts = pairs.map((p, i) => ({ ...p, index: i }));
  const rights = shuffleArr(pairs.map((p, i) => ({ ...p, index: i })));

  matchState = {
    cat, pairs,
    lefts, rights,
    selectedLeft: null,
    selectedRight: null,
    matched: new Set()
  };

  renderMatchBoard();
}

function renderMatchBoard() {
  const cat = matchState.cat;
  const speakLang = cat.speakItemLang || 'pt-PT';

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:${cat.color}">${cat.emoji} ${cat.title}</h2>
    <div class="match-area">
      <p class="instruction" style="margin-bottom:15px">${cat.intro}</p>
      <div class="match-row">
        <div class="match-column">
          ${matchState.lefts.map(item => `
            <div class="match-item ${matchState.matched.has(item.index) ? 'matched' : ''} ${matchState.selectedLeft === item.index ? 'selected' : ''}"
                 onclick="pickMatchLeft(${item.index})"
                 id="left-${item.index}">${item.left}</div>
          `).join('')}
        </div>
        <div class="match-column">
          ${matchState.rights.map(item => `
            <div class="match-item ${matchState.matched.has(item.index) ? 'matched' : ''} ${matchState.selectedRight === item.index ? 'selected' : ''}"
                 onclick="pickMatchRight(${item.index})"
                 id="right-${item.index}">${item.right}</div>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="text-align:center;margin-top:10px">
      <button class="trace-btn clear-btn" onclick="renderMatchGame()">📋 Outro jogo</button>
    </div>
  `;

  // Falar instrução
  setTimeout(() => speak(cat.intro), 200);
}

function pickMatchLeft(idx) {
  if (matchState.matched.has(idx)) return;
  matchState.selectedLeft = idx;

  const item = matchState.pairs[idx];
  const speakLang = matchState.cat.speakItemLang || 'pt-PT';
  if (item.sayLeft) {
    speak(item.sayLeft, speakLang, false);
  }

  // Se já tinha selecionado lado direito, tenta ligar
  if (matchState.selectedRight !== null) {
    tryConnectMatch();
  } else {
    renderMatchBoard();
  }
}

function pickMatchRight(idx) {
  if (matchState.matched.has(idx)) return;
  matchState.selectedRight = idx;

  // Se já tinha selecionado lado esquerdo, tenta ligar
  if (matchState.selectedLeft !== null) {
    tryConnectMatch();
  } else {
    renderMatchBoard();
  }
}

function tryConnectMatch() {
  const leftIdx = matchState.selectedLeft;
  const rightIdx = matchState.selectedRight;

  if (leftIdx === rightIdx) {
    // Certo!
    matchState.matched.add(leftIdx);
    matchState.selectedLeft = null;
    matchState.selectedRight = null;
    sounds.win();
    updateScore(3);
    renderMatchBoard();

    if (matchState.matched.size === matchState.pairs.length) {
      // Acabou!
      const fb = document.getElementById('feedback');
      if (fb) fb.innerHTML = `<span class="celebrate">🎉 Conseguiste ligar tudo! 🎉</span>`;
      speak('Boa Matilde! Conseguiste ligar tudo!');
      setTimeout(() => startMatchCategory(matchState.cat.id), 2500);
    }
  } else {
    // Errado
    sounds.wrong();
    const leftEl = document.getElementById(`left-${leftIdx}`);
    const rightEl = document.getElementById(`right-${rightIdx}`);
    if (leftEl) leftEl.classList.add('wrong-flash');
    if (rightEl) rightEl.classList.add('wrong-flash');
    setTimeout(() => {
      matchState.selectedLeft = null;
      matchState.selectedRight = null;
      renderMatchBoard();
    }, 700);
  }
}

let traceState = null;

function renderTraceGame() {
  const letters = Object.keys(TRACE_LETTERS);
  // Carregar letras já desenhadas dos memo
  const done = JSON.parse(sessionStorage.getItem('trace_done') || '[]');

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#d84315">✍️ Desenha as Letras!</h2>
    <p class="instruction">Escolhe uma letra para aprender a escrever!</p>
    <div class="trace-letter-picker">
      ${letters.map(l => `
        <button class="trace-letter-btn ${done.includes(l) ? 'done' : ''}" onclick="startTraceLetter('${l}')">${l}</button>
      `).join('')}
    </div>
  `;
  setTimeout(() => speak('Escolhe uma letra para desenhar com o dedo!'), 300);
}

function startTraceLetter(letter) {
  const def = TRACE_LETTERS[letter];
  if (!def) return;

  traceState = {
    letter,
    def,
    drawing: false,
    points: [], // pontos do utilizador
    strokes: [] // lista de strokes (arrays de pontos)
  };

  drawTraceCanvas();
  setTimeout(() => speak(`Desenha a letra ${def.say}. Começa no ponto verde!`), 300);
}

function drawTraceCanvas() {
  const def = traceState.def;
  const userPath = traceState.strokes.map(stroke => {
    if (stroke.length === 0) return '';
    return 'M ' + stroke.map(p => `${p.x} ${p.y}`).join(' L ');
  }).join(' ');

  // Adicionar stroke atual (em curso)
  let currentPath = '';
  if (traceState.points.length > 0) {
    currentPath = 'M ' + traceState.points.map(p => `${p.x} ${p.y}`).join(' L ');
  }

  document.getElementById('gameArea').innerHTML = `
    <h2 class="game-title" style="color:#d84315">✍️ Letra ${traceState.letter}</h2>
    <p class="instruction">Segue a linha cor-de-laranja com o dedo!</p>
    <div class="trace-canvas-wrap">
      <div class="trace-canvas">
        <svg id="traceSvg" viewBox="0 0 300 320" preserveAspectRatio="xMidYMid meet">
          <!-- Letra grande de fundo (transparente) -->
          <text x="150" y="240" text-anchor="middle" font-size="280" font-family="Arial Black, Arial, sans-serif"
                fill="#fff3e0" stroke="#ffe0b2" stroke-width="2" font-weight="900">${traceState.letter}</text>
          <!-- Linha guia -->
          <path d="${def.guide}" class="guide-line"/>
          <!-- User strokes -->
          <path d="${userPath} ${currentPath}" class="user-stroke"/>
          <!-- Ponto inicial (verde) -->
          <circle cx="${def.startX}" cy="${def.startY}" r="12" class="start-dot"/>
        </svg>
      </div>
    </div>
    <div class="trace-controls">
      <button class="trace-btn clear-btn" onclick="clearTrace()">🧽 Apagar</button>
      <button class="trace-btn next-trace-btn" onclick="finishTrace()">✓ Pronto!</button>
      <button class="trace-btn clear-btn" onclick="renderTraceGame()">← Outras letras</button>
    </div>
    <div class="feedback" id="feedback"></div>
  `;

  setupTraceCanvas();
}

function setupTraceCanvas() {
  const svg = document.getElementById('traceSvg');
  if (!svg) return;

  const getPoint = (e) => {
    const rect = svg.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    const x = ((p.clientX - rect.left) / rect.width) * 300;
    const y = ((p.clientY - rect.top) / rect.height) * 320;
    return { x, y };
  };

  const start = (e) => {
    e.preventDefault();
    traceState.drawing = true;
    traceState.points = [getPoint(e)];
    redrawTracePaths();
  };

  const move = (e) => {
    if (!traceState.drawing) return;
    e.preventDefault();
    const p = getPoint(e);
    traceState.points.push(p);
    redrawTracePaths();
  };

  const end = (e) => {
    if (!traceState.drawing) return;
    traceState.drawing = false;
    if (traceState.points.length > 1) {
      traceState.strokes.push([...traceState.points]);
    }
    traceState.points = [];
    redrawTracePaths();
  };

  svg.addEventListener('touchstart', start, { passive: false });
  svg.addEventListener('touchmove', move, { passive: false });
  svg.addEventListener('touchend', end);
  svg.addEventListener('mousedown', start);
  svg.addEventListener('mousemove', move);
  svg.addEventListener('mouseup', end);
  svg.addEventListener('mouseleave', end);
}

function redrawTracePaths() {
  const svg = document.getElementById('traceSvg');
  if (!svg) return;
  const userStroke = svg.querySelector('.user-stroke');
  if (!userStroke) return;

  const allPaths = [
    ...traceState.strokes.map(s => 'M ' + s.map(p => `${p.x} ${p.y}`).join(' L ')),
    traceState.points.length > 0 ? 'M ' + traceState.points.map(p => `${p.x} ${p.y}`).join(' L ') : ''
  ].filter(Boolean);

  userStroke.setAttribute('d', allPaths.join(' '));
}

function clearTrace() {
  traceState.strokes = [];
  traceState.points = [];
  drawTraceCanvas();
}

function finishTrace() {
  // Critério simples: se desenhou pelo menos algumas pinceladas, dá positivo
  const totalPoints = traceState.strokes.reduce((s, st) => s + st.length, 0);
  if (totalPoints < 5) {
    speak('Tens de desenhar a letra primeiro!');
    return;
  }

  sounds.win();
  updateScore(5);

  const done = JSON.parse(sessionStorage.getItem('trace_done') || '[]');
  if (!done.includes(traceState.letter)) {
    done.push(traceState.letter);
    sessionStorage.setItem('trace_done', JSON.stringify(done));
  }

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<span class="celebrate">🎉 Boa! Desenhaste a letra ${traceState.def.say}! 🎉</span>`;
  speak(`Boa Matilde! Desenhaste a letra ${traceState.def.say}!`);

  setTimeout(renderTraceGame, 2500);
}

</script>
</body>
</html>
